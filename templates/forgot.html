<!DOCTYPE html>
<html>
<head>
  <title>Recover Password — Smart Travel Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <style>
    html,body{height:100%;margin:0;}
    .split-wrap{display:flex;min-height:100vh;font-family:'Inter',sans-serif;}
    .left-panel{flex:1;background:linear-gradient(150deg,#0d1b4b,#1f3c88 60%,#11998e);display:flex;flex-direction:column;justify-content:center;padding:70px 60px;color:#fff;position:relative;overflow:hidden;}
    .left-panel span.orb{position:absolute;border-radius:50%;opacity:.1;}
    .left-panel span.orb:nth-child(1){width:320px;height:320px;background:#fff;top:-80px;left:-60px;}
    .left-panel span.orb:nth-child(2){width:200px;height:200px;background:#38ef7d;bottom:20px;right:-50px;}
    .brand-logo{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:28px;}
    .brand-logo em{color:#38ef7d;font-style:normal;}
    .right-panel{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#f0f4fc;padding:60px 40px;}
    [data-theme="dark"] .right-panel{background:#0b1120;}
    .form-box{width:100%;max-width:380px;}
    .form-box h2{font-family:'Playfair Display',serif;font-weight:700;font-size:1.7rem;margin-bottom:5px;color:#1a202c;}
    [data-theme="dark"] .form-box h2{color:#e8edf7;}
    .form-control{border-radius:10px;border:1.5px solid #dde3f0;padding:10px 14px 10px 40px;background:#fff;color:#1a202c;font-size:.9rem;}
    [data-theme="dark"] .form-control{background:#151f35;border-color:#243052;color:#e8edf7;}
    .form-control:focus{border-color:#1f3c88;box-shadow:0 0 0 3px rgba(31,60,136,.15);}
    .inp-wrap{position:relative;}
    .inp-wrap .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9aa5be;z-index:2;}
    .btn-recover{background:linear-gradient(135deg,#f7971e,#ffd200);border:none;border-radius:12px;padding:11px;font-size:.95rem;font-weight:600;color:#1a202c;box-shadow:0 6px 20px rgba(247,151,30,.3);transition:all .3s;}
    .btn-recover:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(247,151,30,.4);color:#1a202c;}
    .back-link{font-size:.85rem;text-align:center;margin-top:18px;}
    .back-link a{color:#1f3c88;text-decoration:none;font-weight:500;}
    [data-theme="dark"] .back-link a{color:#7fb3f5;}
    .theme-toggle{position:fixed;top:16px;right:20px;z-index:999;}
  </style>
</head>
<body>
<div class="theme-toggle"><button class="btn btn-sm btn-dark theme-toggle-btn" onclick="toggleTheme()">🌙 Dark</button></div>
<div class="split-wrap">
  <div class="left-panel">
    <span class="orb"></span><span class="orb"></span>
    <div class="brand-logo">🌍 Smart<em>Travel</em></div>
    <p style="font-size:1.25rem;font-weight:300;line-height:1.7;"><strong>"Adventure is worthwhile in itself."</strong></p>
    <p style="opacity:.7;font-size:.9rem;margin-top:12px;">Don't worry — we'll help you regain access in seconds. 🔑</p>
  </div>
  <div class="right-panel">
    <div class="form-box">
      <h2>Recover Access 🔐</h2>
      <p style="color:#718096;font-size:.88rem;margin-bottom:26px;">Enter your username and we'll help you reset your password.</p>
      <form method="POST">
        <div class="mb-4 inp-wrap">
          <span class="ic">👤</span>
          <input type="text" name="username" class="form-control" placeholder="Your Username" required>
        </div>
        <button type="submit" class="btn btn-recover w-100">Find My Account →</button>
      </form>
      {% if message %}
      <div class="alert alert-info mt-3 py-2 px-3 rounded-3" style="font-size:.88rem;">{{ message }}</div>
      {% endif %}
      <p class="back-link"><a href="/">← Back to Login</a></p>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
