<!-- CHATBOT TOGGLE BUTTON -->
<button onclick="toggleChat()" id="chatToggleBtn" style="
  position:fixed;bottom:28px;right:28px;width:58px;height:58px;
  border-radius:50%;background:linear-gradient(135deg,#1f3c88,#11998e);
  color:#fff;font-size:1.5rem;border:none;
  box-shadow:0 6px 24px rgba(31,60,136,.4);
  cursor:pointer;z-index:9998;display:flex;align-items:center;justify-content:center;
  transition:transform .25s cubic-bezier(.175,.885,.32,1.275);
" onmouseover="this.style.transform='scale(1.12)'" onmouseout="this.style.transform='scale(1)'">💬</button>

<!-- CHATBOX -->
<div id="chatbox" style="
  display:none;position:fixed;bottom:100px;right:28px;
  width:370px;height:510px;z-index:9999;
  border-radius:20px;overflow:hidden;
  flex-direction:column;
  box-shadow:0 24px 60px rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.1);
">
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1f3c88,#11998e);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div style="color:#fff;font-weight:700;font-size:.98rem;">🤖 AI Travel Assistant</div>
      <div style="color:rgba(255,255,255,.75);font-size:.74rem;margin-top:2px;">Powered by Smart Travel AI</div>
    </div>
    <button onclick="toggleChat()" style="background:rgba(255,255,255,.18);border:none;width:30px;height:30px;border-radius:50%;color:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:.2s;" onmouseover="this.style.background='rgba(255,255,255,.3)'" onmouseout="this.style.background='rgba(255,255,255,.18)'">✕</button>
  </div>

  <!-- Messages -->
  <div id="chatMessages" style="flex:1;overflow-y:auto;padding:18px;background:var(--bg-secondary);color:var(--text-primary);scroll-behavior:smooth;">
    <div style="margin-bottom:14px;display:flex;justify-content:flex-start;">
      <div style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:12px 16px;border-radius:16px;border-bottom-left-radius:4px;max-width:88%;font-size:.88rem;line-height:1.5;">
        <strong style="color:var(--brand-primary);">AI:</strong><br>
        Hi! 👋 I'm your AI travel assistant for Maharashtra. Ask me about beaches, forts, hill stations, or any specific preferences!
      </div>
    </div>
  </div>

  <!-- Input -->
  <div style="padding:14px 16px;border-top:1px solid var(--border-color);background:var(--bg-secondary);">
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="text" id="chatInput" style="
        flex:1;border-radius:50px;border:1.5px solid var(--border-color);
        background:var(--bg-primary);color:var(--text-primary);
        padding:10px 16px;font-size:.87rem;outline:none;transition:.2s;
      " placeholder="Ask about trips, beaches, forts..."
        onfocus="this.style.borderColor='#1f3c88'"
        onblur="this.style.borderColor='var(--border-color)'"
        onkeypress="if(event.key==='Enter')sendMessage()" />
      <button onclick="sendMessage()" style="
        width:40px;height:40px;border-radius:50%;
        background:linear-gradient(135deg,#1f3c88,#11998e);
        border:none;color:#fff;font-size:1rem;cursor:pointer;
        display:flex;align-items:center;justify-content:center;
        box-shadow:0 4px 12px rgba(31,60,136,.3);transition:.2s;flex-shrink:0;
      " onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">➤</button>
    </div>
  </div>
</div>

<script>
function toggleChat(){
  const box=document.getElementById('chatbox');
  if(box.style.display==='none'||box.style.display===''){
    box.style.display='flex';
    document.getElementById('chatInput').focus();
  } else { box.style.display='none'; }
}

function sendMessage(){
  const input=document.getElementById('chatInput');
  const message=input.value.trim();
  if(!message) return;
  const msgs=document.getElementById('chatMessages');

  msgs.innerHTML+=`<div style="margin-bottom:12px;display:flex;justify-content:flex-end;animation:fadePage .25s ease-in;">
    <div style="background:linear-gradient(135deg,#1f3c88,#3c5ccf);color:#fff;padding:11px 15px;border-radius:16px;border-bottom-right-radius:4px;max-width:85%;font-size:.88rem;line-height:1.5;">${message}</div>
  </div>`;
  input.value='';
  msgs.scrollTop=msgs.scrollHeight;

  const typingId='typing-'+Date.now();
  msgs.innerHTML+=`<div id="${typingId}" style="margin-bottom:12px;display:flex;justify-content:flex-start;">
    <div style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-muted);padding:11px 16px;border-radius:16px;border-bottom-left-radius:4px;font-size:.85rem;">
      <span style="display:inline-flex;gap:4px;">
        <span style="width:7px;height:7px;background:var(--text-muted);border-radius:50%;display:inline-block;animation:pulse-dot 1.4s infinite;"></span>
        <span style="width:7px;height:7px;background:var(--text-muted);border-radius:50%;display:inline-block;animation:pulse-dot 1.4s .2s infinite;"></span>
        <span style="width:7px;height:7px;background:var(--text-muted);border-radius:50%;display:inline-block;animation:pulse-dot 1.4s .4s infinite;"></span>
      </span>
    </div>
  </div>`;
  msgs.scrollTop=msgs.scrollHeight;

  fetch('/chatbot',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message}) })
    .then(r=>r.json())
    .then(data=>{
      const el=document.getElementById(typingId);
      if(el) el.remove();
      msgs.innerHTML+=`<div style="margin-bottom:14px;display:flex;justify-content:flex-start;animation:fadePage .3s ease-in;">
        <div style="background:var(--bg-primary);border:1px solid var(--border-color);color:var(--text-primary);padding:12px 16px;border-radius:16px;border-bottom-left-radius:4px;max-width:90%;font-size:.88rem;line-height:1.6;">
          <strong style="color:var(--brand-primary);">AI:</strong><br>${data.reply.replace(/\n/g,'<br>')}
        </div>
      </div>`;
      msgs.scrollTop=msgs.scrollHeight;
    })
    .catch(()=>{
      const el=document.getElementById(typingId);
      if(el) el.remove();
      msgs.innerHTML+=`<div style="margin-bottom:12px;display:flex;justify-content:flex-start;">
        <div style="background:#ef4444;color:#fff;padding:11px 15px;border-radius:16px;border-bottom-left-radius:4px;font-size:.88rem;">Connection error. Please try again.</div>
      </div>`;
      msgs.scrollTop=msgs.scrollHeight;
    });
}
</script>
